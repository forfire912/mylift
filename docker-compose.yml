services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
      - mylift-data:/app/data
    command: >
      sh -c "pip install -r requirements.txt -q &&
             DATABASE_URL=sqlite:////app/data/mylift.db
             uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/mylift.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mylift-data:
